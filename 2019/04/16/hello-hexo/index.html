	<script type="text/javascript">
		 $(window).scroll(function(){
				// console.log($(window).scrollTop());
				if($(window).scrollTop()> 100 ){
					$('#return-top').fadeIn(300);
					}
				 else{$('#return-top').fadeOut(200);}
					 })


		// 点击按钮，使得页面返回顶部
		$("#return-top").click(function(){
			$('body,html').animate({scrollTop:0},300);
		});
		// 鼠标悬浮按钮之上，图片消失，文字显示
		$(".top_e").mouseover(function(){
			$("#img").hide();
			$("#font").show();
		})
		//鼠标离开，文字消失，图片显示。
		$(".top_e").mouseout(function(){
			$("#font").hide();
			$("#img").show();
		})
		
		function toTop(){
			$('body,html').animate({scrollTop:0},400);
		}


		$(document).ready(function() {
			var $arContent = $('.post-content');
			$arContentAnchor = $arContent.find('.headerlink');
			$("#article-toc").find('a').each(function(i){
				var $this = $(this);
				$this.click(function(e){
					e.preventDefault();
					$('html,body').animate({ scrollTop: $arContentAnchor.eq(i).offset().top - 40}, 400, 'swing');
				});
			});
		});
	</script>
